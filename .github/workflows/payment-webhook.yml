</body>
</html>
HTMLEOF

          # Replace placeholders using unique delimiters to avoid collisions with tier text
          sed -i "s|{{TIER_INFO}}|${TIER_EMOJI} ${TIER_NAME} (${TIER_PRICE})|g" /tmp/email.html
          sed -i "s|{{AMOUNT_INFO}}|\$${AMOUNT} USD|g" /tmp/email.html
          sed -i "s|{{PREMIUM_KEY}}|${KEY}|g" /tmp/email.html
          sed -i "s|{{FEATURES_LIST}}|${FEATURES}|g" /tmp/email.html

          # Send email via Resend API (with retry for transient failures)
          HTTP_CODE=$(curl -s -o /tmp/resend-response.json -w '%{http_code}' \
            --retry 3 --retry-delay 5 --retry-max-time 30 \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: AIGENEV7-Payment-Worker/1.0" \
            -d "$(jq -n \
              --arg from "${EMAIL_FROM:-AIGENEV7 <noreply@aigenev7.com>}" \
              --arg to "$EMAIL" \
              --arg subject "Your AIGENEV7 ${TIER_NAME} Premium Key" \
              --rawfile html /tmp/email.html \
              '{from: $from, to: [$to], subject: $subject, html: $html}'
            )")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Email sent successfully to ${EMAIL}"
            if jq -e '.id' /tmp/resend-response.json > /dev/null 2>&1; then
              EMAIL_ID=$(jq -r '.id' /tmp/resend-response.json)
              echo "📧 Email ID: ${EMAIL_ID}"
            else
              echo "📧 Email sent (could not parse response ID)"
            fi
          else
            echo "❌ Failed to send email (HTTP ${HTTP_CODE})"
            cat /tmp/resend-response.json 2>/dev/null || echo "No response body"
            echo ""
            echo "📋 Key for manual delivery: ${KEY}"
            echo "📧 Email the key to: ${EMAIL}"
          fi

      - name: Create delivery log issue
        uses: actions/github-script@v7
        with:
          script: |
            const tier = '${{ steps.genkey.outputs.tier }}'
            const email = '${{ steps.genkey.outputs.email }}'
            const chargeId = '${{ github.event.client_payload.charge_id }}'
            const amount = '${{ github.event.client_payload.amount }}'
            const key = '${{ steps.genkey.outputs.key }}'

            const tierEmoji = { pro: '⭐', elite: '💎', enterprise: '🏢' }[tier] || '❓'
            const tierPrice = { pro: '$5/mo', elite: '$15/mo', enterprise: '$35/mo' }[tier] || '❓'

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${tierEmoji} Key Delivered — ${tier.toUpperCase()} to ${email}`,
              body: `## ✅ Premium Key Auto-Delivered\n\n` +
                `| Field | Value |\n|-------|-------|\n` +
                `| Tier | ${tierEmoji} ${tier} (${tierPrice}) |\n` +
                `| Email | ${email} |\n` +
                `| Amount | $${amount} USD |\n` +
                `| Charge ID | ${chargeId} |\n` +
                `| Payment Method | Coinbase Commerce |\n` +
                `| Key | \`${key}\` |\n\n` +
                `---\n\n` +
                `*This key was automatically generated and emailed via Resend API.*`,
              labels: ['payment', 'premium', tier, 'delivered'],
            })

      - name: Final status
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Payment processed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📧 Customer email: ${{ steps.genkey.outputs.email }}"
          echo "🔑 Premium tier: ${{ steps.genkey.outputs.tier }}"
          echo "💰 Amount: ${{ github.event.client_payload.amount }} USD"
          echo ""
          echo "The premium key has been automatically emailed to the customer."
          echo ""
