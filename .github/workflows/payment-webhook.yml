<table style="width:100%;border-collapse:collapse;">
<tr><td style="color:#8888aa;font-size:13px;padding:4px 0;">Tier</td><td style="color:#e0e0ee;font-size:13px;font-weight:600;text-align:right;padding:4px 0;">{{TIER_INFO}}</td></tr>
<tr><td style="color:#8888aa;font-size:13px;padding:4px 0;">Amount Paid</td><td style="color:#e0e0ee;font-size:13px;font-weight:600;text-align:right;padding:4px 0;">{{AMOUNT_INFO}}</td></tr>
</table>
</div>
<div style="margin-bottom:24px;">
<label style="color:#8888aa;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:8px;">Your Premium Key</label>
<div style="background:#0a0a0f;border:1px solid #1e1e30;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:14px;color:#00ff88;word-break:break-all;line-height:1.5;">{{PREMIUM_KEY}}</div>
</div>
<div style="background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.15);border-radius:8px;padding:16px;margin-bottom:24px;">
<h3 style="color:#00ff88;font-size:14px;font-weight:700;margin:0 0 12px 0;">🚀 How to Activate</h3>
<p style="color:#e0e0ee;font-size:13px;line-height:1.6;margin:0 0 12px 0;">Set your premium key as an environment variable:</p>
<div style="background:#0a0a0f;border:1px solid #1e1e30;border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#00ff88;">export AIGENEV7_PREMIUM_KEY={{PREMIUM_KEY}}</div>
<p style="color:#8888aa;font-size:12px;line-height:1.5;margin:12px 0 0 0;">Or run directly:</p>
<div style="background:#0a0a0f;border:1px solid #1e1e30;border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#00ff88;">bun run inference-cli.js chat --premium-key {{PREMIUM_KEY}}</div>
</div>
<div style="margin-bottom:0;">
<h3 style="color:#e0e0ee;font-size:14px;font-weight:700;margin:0 0 12px 0;">✨ What You Unlocked</h3>
<div style="color:#8888aa;font-size:13px;line-height:1.8;">{{FEATURES_LIST}}</div>
</div>
</div>
<div style="text-align:center;padding:16px 0;">
<p style="color:#55557a;font-size:12px;margin:0;">Built by CONSTANZA • <a href="https://github.com/constanza8999" style="color:#8888aa;text-decoration:none;">@constanza8999</a></p>
<p style="color:#55557a;font-size:11px;margin:8px 0 0 0;">AIGENEV7 — Free AI for everyone. MIT License.</p>
